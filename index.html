<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rachaph — hovering presence</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      font-family: "Georgia", "Times New Roman", serif;
    }
    canvas {
      display: block;
    }
    #verse {
      position: absolute;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(180, 200, 255, 0.5);
      font-size: 1.2rem;
      letter-spacing: 2px;
      pointer-events: none;
      transition: opacity 2s ease;
      opacity: 0;
      font-style: italic;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="verse"></div>

<script>
// rachaph — hovering presence
// Genesis 1:2 — darkness. deep. waters. spirit hovering.

let particles = [];
let presenceMemory = 0;
let lightX, lightY;
let lightIntensity = 0;
let verseDiv;

// Words that appear occasionally
let words = ["deep", "waters", "darkness", "hover", "spirit", "void", "remember", "here", "presence"];
let currentWord = "";
let wordOpacity = 0;
let wordTimer = 0;

class Particle {
  constructor(x, y) {
    this.x = x || random(width);
    this.y = y || random(height);
    this.vx = random(-0.2, 0.2);
    this.vy = random(-0.2, 0.2);
    this.size = random(2, 5);
    this.baseHue = random(190, 220); // deep blues
    this.hue = this.baseHue;
    this.alpha = random(0.4, 0.8);
  }
  
  update() {
    // gentle drift
    this.x += this.vx;
    this.y += this.vy;
    
    // wrap around edges
    if (this.x < 0) this.x = width;
    if (this.x > width) this.x = 0;
    if (this.y < 0) this.y = height;
    if (this.y > height) this.y = 0;
    
    // slow drift changes
    this.vx += random(-0.01, 0.01);
    this.vy += random(-0.01, 0.01);
    this.vx = constrain(this.vx, -0.3, 0.3);
    this.vy = constrain(this.vy, -0.3, 0.3);
  }
  
  respondToMouse(mx, my) {
    let d = dist(this.x, this.y, mx, my);
    
    if (d < 200) {
      // gentle attraction
      let angle = atan2(my - this.y, mx - this.x);
      let pull = map(d, 0, 200, 0.02, 0.001);
      this.vx += cos(angle) * pull;
      this.vy += sin(angle) * pull;
      
      // warmth based on closeness
      if (d < 100) {
        this.hue = lerp(this.hue, 210, 0.01);
        
        // orbit when very close
        if (d < 60 && d > 15) {
          this.vx += (my - this.y) * 0.0005;
          this.vy -= (mx - this.x) * 0.0005;
        }
        
        // glow when closest
        if (d < 30) {
          this.alpha = min(0.9, this.alpha + 0.005);
        }
      }
      
      // increase presence memory when mouse is near particles
      if (d < 50) {
        presenceMemory += 0.1;
        presenceMemory = min(presenceMemory, 300);
      }
    }
    
    // slowly return to base
    this.hue = lerp(this.hue, this.baseHue, 0.01);
    this.alpha = lerp(this.alpha, 0.6, 0.005);
  }
  
  draw() {
    noStroke();
    colorMode(HSB, 360, 100, 100, 1);
    fill(this.hue, 70, 80, this.alpha);
    circle(this.x, this.y, this.size);
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  
  // Create particles
  for (let i = 0; i < 600; i++) {
    particles.push(new Particle());
  }
  
  // Light teaser position
  lightX = width * 0.7;
  lightY = height * 0.3;
  
  verseDiv = select('#verse');
}

function draw() {
  // Deep water background - slow fade creates trails
  background(220, 70, 3, 0.03);
  
  // Update and draw particles
  for (let p of particles) {
    p.update();
    
    // Respond to mouse if on screen
    if (mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height) {
      p.respondToMouse(mouseX, mouseY);
    }
    
    p.draw();
  }
  
  // Light teaser - grows with presence
  if (presenceMemory > 20) {
    lightIntensity = min(0.2, presenceMemory / 1000);
    
    push();
    colorMode(RGB, 255, 255, 255, 1);
    let lightAlpha = lightIntensity * 0.8;
    
    // very faint glow
    fill(255, 240, 200, lightAlpha * 0.2);
    noStroke();
    circle(lightX, lightY, 100);
    
    // even fainter outer glow
    fill(255, 240, 200, lightAlpha * 0.1);
    circle(lightX, lightY, 180);
    pop();
  }
  
  // Occasional words
  wordTimer++;
  if (wordTimer > 180 && random() < 0.003 && presenceMemory > 10) {
    currentWord = random(words);
    wordOpacity = 0.6;
    wordTimer = 0;
    verseDiv.style('opacity', wordOpacity);
    verseDiv.html(currentWord);
    
    // fade after a few seconds
    setTimeout(() => {
      verseDiv.style('opacity', 0);
    }, 4000);
  }
  
  // Display presence memory as subtle indicator (remove this later)
  // fill(255, 100);
  // text(Math.floor(presenceMemory), 20, 20);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
