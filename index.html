<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rachaph — Hovering Presence</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #01040a;
      touch-action: none;
      font-family: Georgia, "Times New Roman", serif;
    }
    canvas { display: block; }
    #verse {
      position: absolute;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(160, 196, 255, 0.78);
      font-size: 2.4rem;
      letter-spacing: 0.08em;
      font-weight: 300;
      font-style: italic;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.4s ease;
      text-shadow: 0 0 28px rgba(90, 130, 255, 0.28);
      max-width: 88%;
      line-height: 1.38;
      z-index: 2;
    }
    #hint {
      position: absolute;
      bottom: 7%;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(184, 202, 255, 0.38);
      font-size: 1rem;
      letter-spacing: 0.06em;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 2s ease, color 1.5s ease;
      z-index: 2;
      max-width: 90%;
    }
    @media (max-width: 900px) {
      #verse { font-size: 1.95rem; }
    }
    @media (max-width: 600px) {
      #verse { font-size: 1.45rem; top: 10%; letter-spacing: 0.04em; }
      #hint { font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div id="verse"></div>
  <div id="hint"></div>

  <script>
    let particles = [];
    let wakes = [];
    let farStars = [];
    let beams = [];
    let sparkParticles = []; // new: click sparks
    let verseDiv;
    let hintDiv;
    let pointerX = 0;
    let pointerY = 0;
    let pointerActive = false;
    let lastPointerX = 0;
    let lastPointerY = 0;
    let movementSpeed = 0;
    let cameraDriftX = 0;
    let cameraDriftY = 0;
    let audioStarted = false;
    let windOsc, breathOsc, windFilter;
    let sequenceIndex = 0;
    let lastVerseTime = 0;
    let sequenceStarted = false;
    let wideBeamActive = false;
    let wideBeamProgress = 0;
    let sequenceComplete = false;
    let introShown = false;
    let hintShown = false;

    const beamPhrases = [
      "hovering over the face of the waters",
      "Spirit brooding upon the deep",
      "above the formless void",
      "moving gently on the waters",
      "breath waiting in the darkness",
      "stillness before the word"
    ];

    const genesisVerse = "In the beginning God created the heavens and the earth.";
    const REPLAY_TEXT = "hover again";

    class Particle { /* unchanged from previous version */ 
      // ... (keeping your original Particle class here for brevity)
      constructor() { /* ... */ }
      update() { /* ... */ }
      draw() { /* ... */ }
    }

    class Wake { /* unchanged */ 
      // ... 
    }

    class FarStar { /* unchanged */ 
      // ...
    }

    class SoftBeam { /* unchanged — still drifting for atmosphere */ 
      // ...
      constructor(index) { /* ... */ }
      getX() { /* ... */ }
      getY() { /* ... */ }
      draw() { /* ... */ }
    }

    class SparkParticle {  // new: gentle click sparks
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = random(-1.2, 1.2);
        this.vy = random(-2.5, -0.8); // mostly upward
        this.size = random(2, 5);
        this.life = 1;
        this.hue = random(195, 225);
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.08; // gentle gravity
        this.life -= 0.022;
        this.size *= 0.98;
      }
      draw() {
        noStroke();
        fill(this.hue, 40, 100, this.life * 0.7);
        circle(this.x, this.y, this.size * 2.2);
        fill(this.hue, 30, 100, this.life * 0.4);
        circle(this.x, this.y, this.size);
      }
      isDead() { return this.life <= 0; }
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 1);
      verseDiv = select("#verse");
      hintDiv = select("#hint");

      const particleCount = min(2400, floor((windowWidth * windowHeight) / 720));
      for (let i = 0; i < particleCount; i++) particles.push(new Particle());
      for (let i = 0; i < 220; i++) farStars.push(new FarStar(random(0.2, 1)));
      for (let i = 0; i < beamPhrases.length; i++) beams.push(new SoftBeam(i));

      pointerX = width * 0.5;
      pointerY = height * 0.58;
      background(220, 70, 4, 1);
    }

    function draw() {
      background(220, 70, 4, 0.19);
      updateCameraDrift();

      drawBreathField();
      drawFarStars();

      for (const beam of beams) beam.draw();

      if (wideBeamActive) {
        wideBeamProgress = min(wideBeamProgress + 0.0008, 1);
        const cx = width * 0.5;
        const ty = height * 0.05;
        noStroke();
        for (let i = 0; i < 14; i++) {
          let p = wideBeamProgress * (1 + i * 0.07);
          let a = map(i, 0, 13, 0.09, 0.003) * p;
          let w = width * 1.3 * p;
          let h = height * 1.5 * p;
          fill(210, 28, 98, a);
          ellipse(cx, ty, w, h);
        }
      }

      drawWakeTrail();

      for (const p of particles) { p.update(); p.draw(); }

      // draw & update sparks
      for (let i = sparkParticles.length - 1; i >= 0; i--) {
        sparkParticles[i].update();
        sparkParticles[i].draw();
        if (sparkParticles[i].isDead()) sparkParticles.splice(i, 1);
      }

      drawDepthVeil();
      drawPointerHalo();

      updatePresence();
      updateSequence();
      updateHintAndIntro();
      updateSound();
    }

    function updateSequence() {
      if (!sequenceStarted) return;

      const now = millis();
      if (sequenceComplete) return;

      const interval = random(9000, 11000); // ~9–11 sec variation

      if (sequenceIndex < beamPhrases.length) {
        if (now - lastVerseTime > interval) {
          showVerse(beamPhrases[sequenceIndex], 5200);
          lastVerseTime = now;
          sequenceIndex++;
        }
      } else if (!wideBeamActive) {
        if (now - lastVerseTime > 12000) {
          wideBeamActive = true;
          showVerse(genesisVerse, 14000);
          lastVerseTime = now;
        }
      } else if (wideBeamProgress > 0.95 && now - lastVerseTime > 18000) {
        sequenceComplete = true;
        hintDiv.html(REPLAY_TEXT);
        hintDiv.style("opacity", "0.7");
        hintDiv.style("color", "rgba(220, 240, 255, 0.58)");
      }
    }

    function restartSequence() {
      sequenceIndex = 0;
      lastVerseTime = millis();
      wideBeamActive = false;
      wideBeamProgress = 0;
      sequenceComplete = false;
      sequenceStarted = true;
      showVerse("before speech, before form", 3200);
      hintDiv.style("opacity", "0");
    }

    function updateHintAndIntro() {
      const now = millis();
      if (!introShown && now > 300) {
        introShown = true;
        showVerse("before speech, before form", 3200);
        sequenceStarted = true;
        lastVerseTime = now;
      }
      if (!hintShown && now > 3000) {
        hintShown = true;
        hintDiv.style("opacity", "0.75");
      }
    }

    function showVerse(text, duration) {
      verseDiv.html(text);
      verseDiv.style("opacity", "0.95");
      clearTimeout(showVerse.fadeTimer);
      showVerse.fadeTimer = setTimeout(() => {
        verseDiv.style("opacity", "0");
      }, duration);
    }

    // ... (keep updateCameraDrift, cameraVelocityX/Y, wrap, drawBreathField, drawFarStars, drawWakeTrail, drawDepthVeil, drawPointerHalo, updatePresence unchanged)

    function initAudio() { /* unchanged */ }

    function updateSound() {
      if (!audioStarted) return;
      const movement = constrain(movementSpeed / 18, 0, 1);
      let drift = map(noise(frameCount * 0.008), 0, 1, 102, 165);
      let breathBase = map(sin(frameCount * 0.016), -1, 1, 56, 68);

      // gentle deepening on movement (instead of beam)
      if (movement > 0.1) {
        breathBase -= 8;
        breathOsc.amp(map(movement, 0, 1, 0.011, 0.006), 0.3);
      }
      breathOsc.freq(breathBase);
      windOsc.freq(drift + movement * 24);
      windFilter.freq(map(movement, 0, 1, 380, 1200));
      windOsc.amp(pointerActive ? map(movement, 0, 1, 0.003, 0.018) : 0.002, 0.2);
    }

    function setPointer(x, y) {
      pointerX = constrain(x, 0, width);
      pointerY = constrain(y, 0, height);
      pointerActive = true;
      initAudio();
    }

    function mousePressed() {
      setPointer(mouseX, mouseY);
      sparkParticles.push(new SparkParticle(pointerX, pointerY));
      if (sequenceComplete) restartSequence();
    }

    function touchStarted() {
      initAudio();
      if (touches.length > 0) {
        setPointer(touches[0].x, touches[0].y);
        sparkParticles.push(new SparkParticle(pointerX, pointerY));
        if (sequenceComplete) restartSequence();
      }
      return false;
    }

    // ... (keep mouseMoved, mouseDragged, touchMoved, touchEnded, mouseOut, windowResized unchanged)
  </script>
</body>
</html>
