<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rachaph — Hovering Presence</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    body { margin:0; padding:0; overflow:hidden; background:#000814; }
    canvas { display:block; }
    #verse {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(160, 190, 255, 0.6);
      font-size: 4rem;
      letter-spacing: 6px;
      font-weight: 300;
      font-style: italic;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 6s ease;
      text-shadow: 0 0 40px rgba(80, 120, 255, 0.3);
      max-width: 90%;
      line-height: 1.3;
    }
    @media (max-width: 600px) {
      #verse { font-size: 2.8rem; }
    }
  </style>
</head>
<body>
<div id="verse"></div>

<script>
// Rachaph — Hovering Presence
// Deep darkness. Waters. Spirit hovers before words.
// Single Genesis words appear slowly after calm presence.

let particles = [];
let totalHoverTime = 0;
let lastX = 0, lastY = 0;
let wordIndex = -1;  // before first word

// Single words from Genesis 1:1–3 (exact text, no full sentences)
const genesisWords = [
  "beginning",
  "created",
  "heavens",
  "earth",
  "formless",
  "void",
  "darkness",
  "deep",
  "Spirit",
  "hovering",
  "waters"
];

class Particle {
  constructor() {
    this.x = random(width);
    this.y = random(height);
    this.vx = random(-0.3, 0.3);
    this.vy = random(-0.3, 0.3);
    this.size = random(2.8, 6);
    this.hue = random(190, 230);   // deep blues
    this.alpha = 0.7;              // visible
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0) this.x = width;
    if (this.x > width) this.x = 0;
    if (this.y < 0) this.y = height;
    if (this.y > height) this.y = 0;
  }

  attractTo(mx, my) {
    let d = dist(this.x, this.y, mx, my);
    if (d < 420) {  // large gentle pull radius
      let pull = map(d, 0, 420, 0.09, 0.003);  // strong near, soft far
      let angle = atan2(my - this.y, mx - this.x);
      this.vx += cos(angle) * pull;
      this.vy += sin(angle) * pull;

      // calm & gather when close
      if (d < 140) {
        this.vx *= 0.96;
        this.vy *= 0.96;
        this.hue = lerp(this.hue, 200, 0.03);
        this.alpha = lerp(this.alpha, 0.95, 0.02);
      }
    }
  }

  draw() {
    noStroke();
    fill(this.hue, 65, 75, this.alpha);
    circle(this.x, this.y, this.size);
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);

  for (let i = 0; i < 1100; i++) {
    particles.push(new Particle());
  }

  verseDiv = select('#verse');
}

function draw() {
  background(220, 90, 3, 0.03);  // very slow deep blue fade — stays dark

  for (let p of particles) {
    p.update();
    p.attractTo(mouseX, mouseY);  // always magnet to cursor/finger
    p.draw();
  }

  // Hover time: calm & steady = progress
  let moved = dist(mouseX, mouseY, lastX, lastY);
  if (moved < 12) {
    totalHoverTime++;
  } else {
    totalHoverTime = max(0, totalHoverTime - 1);  // slow decay
  }
  lastX = mouseX; lastY = mouseY;

  // Genesis words appear one at a time after long calm hovering
  if (totalHoverTime > 180 && wordIndex < genesisWords.length - 1) {
    if (frameCount % 600 === 0) {  // ~10 seconds per word
      wordIndex++;
      let word = genesisWords[wordIndex];
      verseDiv.html(word);
      verseDiv.style('opacity', 0.8);
      setTimeout(() => {
        verseDiv.style('opacity', 0);
      }, 12000);  // stay visible 12 seconds
    }
  }

  // Persistent faint stars where you hovered longest
  if (totalHoverTime > 220) {
    fill(60, 40, 100, 0.5);
    for (let i = 0; i < 4; i++) {
      let sx = mouseX + random(-90, 90);
      let sy = mouseY + random(-90, 90);
      circle(sx, sy, 1.4);
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
