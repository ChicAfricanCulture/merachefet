<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rachaph — Hovering Presence</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    body { margin:0; padding:0; overflow:hidden; background:#000814; }
    canvas { display:block; }
    #verse {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(180, 200, 255, 0.7);
      font-size: 3.2rem;
      letter-spacing: 3px;
      font-weight: 300;
      font-style: italic;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 4s ease;
      text-shadow: 0 0 30px rgba(80, 140, 255, 0.4);
      max-width: 85%;
      line-height: 1.35;
    }
    @media (max-width: 600px) {
      #verse { font-size: 2.4rem; }
    }
  </style>
</head>
<body>
<div id="verse"></div>

<script>
// Rachaph — Hovering Presence
// Deep darkness. Waters. Spirit hovers. No rush. Presence first.

let particles = [];
let totalHoverTime = 0;
let lastX = 0, lastY = 0;
let wordIndex = -1;  // start before first word

const genesisWords = [
  "In the beginning God created the heavens and the earth.",
  "The earth was without form and void, and darkness was over the face of the deep.",
  "And the Spirit of God was hovering over the face of the waters.",
  "And God said, 'Let there be light,' and there was light.",
  "And God saw that the light was good.",
  "And God separated the light from the darkness.",
  "God called the light Day, and the darkness he called Night.",
  "And there was evening and there was morning, the first day."
];

class Particle {
  constructor() {
    this.x = random(width);
    this.y = random(height);
    this.vx = random(-0.4, 0.4);
    this.vy = random(-0.4, 0.4);
    this.size = random(2.5, 5.5);
    this.hue = random(190, 230);   // deep blues
    this.alpha = 0.65;             // visible from start
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0) this.x = width;
    if (this.x > width) this.x = 0;
    if (this.y < 0) this.y = height;
    if (this.y > height) this.y = 0;
  }

  attractTo(mx, my) {
    let d = dist(this.x, this.y, mx, my);
    if (d < 380) {  // large magnet radius
      let pull = map(d, 0, 380, 0.12, 0.004);  // strong near, gentle far
      let angle = atan2(my - this.y, mx - this.x);
      this.vx += cos(angle) * pull;
      this.vy += sin(angle) * pull;

      // warmth/glow when pulled
      if (d < 120) {
        this.hue = lerp(this.hue, 200, 0.04);
        this.alpha = lerp(this.alpha, 0.95, 0.03);
      }
    }
  }

  draw() {
    noStroke();
    fill(this.hue, 70, 75, this.alpha);
    circle(this.x, this.y, this.size);
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);

  for (let i = 0; i < 1000; i++) {
    particles.push(new Particle());
  }

  verseDiv = select('#verse');
}

function draw() {
  background(220, 85, 4, 0.035);  // deep dark blue fade — keeps darkness

  for (let p of particles) {
    p.update();
    if (mouseIsPressed || touches.length > 0) {  // mobile touch support
      let mx = mouseX || touches[0]?.x || width/2;
      let my = mouseY || touches[0]?.y || height/2;
      p.attractTo(mx, my);
    }
    p.draw();
  }

  // Hover time accumulation (works on desktop & mobile)
  let hovered = false;
  if (mouseIsPressed || touches.length > 0) {
    hovered = true;
    totalHoverTime++;
  } else if (dist(mouseX, mouseY, lastX, lastY) < 15) {
    hovered = true;
    totalHoverTime++;
  } else {
    totalHoverTime = max(0, totalHoverTime - 1.2);
  }
  lastX = mouseX; lastY = mouseY;

  // Genesis words appear in sequence after sustained hovering
  if (totalHoverTime > 120 && wordIndex < genesisWords.length - 1) {
    if (frameCount % 400 === 0) {  // ~7 seconds per word at 60fps
      wordIndex++;
      let word = genesisWords[wordIndex];
      verseDiv.html(word);
      verseDiv.style('opacity', 0.75);
      setTimeout(() => {
        verseDiv.style('opacity', 0);
      }, 9000);  // fade after 9 seconds
    }
  }

  // Persistent faint stars where you hovered longest
  if (totalHoverTime > 180) {
    fill(60, 40, 100, 0.6);
    for (let i = 0; i < 5; i++) {
      let sx = mouseX + random(-120, 120);
      let sy = mouseY + random(-120, 120);
      circle(sx, sy, 1.6);
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
