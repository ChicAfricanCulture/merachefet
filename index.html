<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rachaph — Hovering Presence</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>
  <style>
    body { margin:0; padding:0; overflow:hidden; background:#000308; }
    canvas { display:block; }
    #verse {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(130, 170, 255, 0.55);
      font-size: 4.8rem;
      letter-spacing: 6px;
      font-weight: 300;
      font-style: italic;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 9s ease;
      text-shadow: 0 0 50px rgba(50, 90, 255, 0.25);
      max-width: 90%;
      line-height: 1.3;
    }
    @media (max-width: 600px) {
      #verse { font-size: 3.4rem; }
    }
  </style>
</head>
<body>
<div id="verse"></div>

<script>
// Rachaph — Hovering Presence
// Restored meditative droplets. Deep darkness. Soothing magnet. Sound from start.

let particles = [];
let totalHoverTime = 0;
let lastX = 0, lastY = 0;
let wordIndex = -1;
let ambientSound;

const genesisWords = [
  "In the beginning",
  "God",
  "created",
  "heavens",
  "earth",
  "formless",
  "void",
  "darkness",
  "deep",
  "Spirit",
  "hovering",
  "waters"
];

class Particle {
  constructor() {
    this.x = random(width);
    this.y = random(height);
    this.vx = random(-0.12, 0.12);  // very slow movement
    this.vy = random(-0.12, 0.12);
    this.size = random(0.8, 5);     // tiny to small droplets
    this.hue = random(200, 240);   // deeper blues
    this.alpha = 0.62;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0) this.x = width;
    if (this.x > width) this.x = 0;
    if (this.y < 0) this.y = height;
    if (this.y > height) this.y = 0;
    
    // tiny random jitter to keep natural
    this.vx += random(-0.01, 0.01);
    this.vy += random(-0.01, 0.01);
    this.vx = constrain(this.vx, -0.15, 0.15);
    this.vy = constrain(this.vy, -0.15, 0.15);
  }

  attractTo(mx, my) {
    let d = dist(this.x, this.y, mx, my);
    if (d < 520) {  // wide radius for visible gathering
      let pull = map(d, 0, 520, 0.07, 0.0008);  // gentle, stronger near
      let angle = atan2(my - this.y, mx - this.x);
      this.vx += cos(angle) * pull;
      this.vy += sin(angle) * pull;

      if (d < 220) {
        this.vx *= 0.91;   // calm/slow
        this.vy *= 0.91;
        this.alpha = lerp(this.alpha, 0.85, 0.008);
        this.size = lerp(this.size, this.size * 1.08, 0.01);  // subtle swell
      }
    }
  }

  draw() {
    noStroke();
    fill(this.hue, 72, 65, this.alpha);
    circle(this.x, this.y, this.size);
  }
}

function preload() {
  // Soothing ambient sound (faint wind/water + breathing)
  ambientSound = loadSound('https://assets.codepen.io/243235/deep-water-ambient.mp3');
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);

  for (let i = 0; i < 1800; i++) {  // higher density for full void
    particles.push(new Particle());
  }

  verseDiv = select('#verse');

  if (ambientSound) {
    ambientSound.loop();
    ambientSound.setVolume(0.06);  // very faint
  }
}

function draw() {
  background(220, 100, 1, 0.012);  // ultra-slow deep blue/black fade

  for (let p of particles) {
    p.update();
    p.attractTo(mouseX, mouseY);
    p.draw();
  }

  let moved = dist(mouseX, mouseY, lastX, lastY);
  if (moved < 8) {
    totalHoverTime++;
  } else {
    totalHoverTime = max(0, totalHoverTime - 0.4);  // very slow decay
  }
  lastX = mouseX; lastY = mouseY;

  // Genesis words — appear one at a time after calm hovering
  if (totalHoverTime > 180 && wordIndex < genesisWords.length - 1) {
    if (frameCount % 720 === 0) {  // ~12 seconds per word
      wordIndex++;
      let word = genesisWords[wordIndex];
      verseDiv.html(word);
      verseDiv.style('opacity', 0.68);
      setTimeout(() => {
        verseDiv.style('opacity', 0);
      }, 18000);  // stay 18 seconds
    }
  }

  // Persistent faint stars where you hovered longest
  if (totalHoverTime > 320) {
    fill(60, 60, 100, 0.3);
    for (let i = 0; i < 3; i++) {
      let sx = mouseX + random(-80, 80);
      let sy = mouseY + random(-80, 80);
      circle(sx, sy, 1.2);
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
