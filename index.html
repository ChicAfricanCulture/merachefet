<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rachaph — Hovering Presence</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #01040a;
      touch-action: none;
    }

    canvas {
      display: block;
    }

    #verse {
      position: absolute;
      top: 16%;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(145, 185, 255, 0.54);
      font-size: 2.8rem;
      letter-spacing: 0.12em;
      font-weight: 300;
      font-style: italic;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.7s ease;
      text-shadow: 0 0 18px rgba(70, 120, 255, 0.18);
      max-width: 90%;
      line-height: 1.3;
      z-index: 2;
    }

    #hint {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(170, 195, 255, 0.26);
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-align: center;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1.2s ease;
      z-index: 2;
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      #verse {
        font-size: 2.2rem;
      }
    }

    @media (max-width: 600px) {
      #verse {
        font-size: 1.7rem;
        top: 12%;
        letter-spacing: 0.06em;
      }

      #hint {
        font-size: 0.9rem;
        bottom: 7%;
        white-space: normal;
        width: 90%;
      }
    }
  </style>
</head>
<body>
  <div id="verse"></div>
  <div id="hint">move slowly through the deep</div>

  <script>
    let particles = [];
    let wakes = [];
    let verseDiv;
    let hintDiv;

    let totalHoverTime = 0;
    let pointerStillFrames = 0;
    let lastPointerX = 0;
    let lastPointerY = 0;
    let movementSpeed = 0;

    let pointerX = 0;
    let pointerY = 0;
    let pointerActive = false;

    let wordIndex = -1;
    let introShown = false;
    let hoverTextCooldown = 0;

    let windOsc;
    let breathOsc;
    let windFilter;
    let noiseEnvReady = false;
    let audioStarted = false;

    const scriptureMoments = [
      { text: "In the beginning", trigger: 0, duration: 3800 },
      { text: "darkness over the deep", trigger: 140, duration: 4200 },
      { text: "hovering over the waters", trigger: 320, duration: 4600 },
      { text: "Let there be light", trigger: 620, duration: 5200 }
    ];

    class Particle {
      constructor() {
        this.x = random(width);
        this.y = random(height);
        this.vx = random(-0.05, 0.05);
        this.vy = random(-0.03, 0.03);
        this.baseSize = random(1.2, 4.2);
        this.size = this.baseSize;
        this.hue = random(198, 214);
        this.sat = random(38, 58);
        this.bri = random(58, 88);
        this.alpha = random(0.14, 0.28);
        this.glow = 0;
      }

      update() {
        const n = noise(this.x * 0.0018, this.y * 0.0018, frameCount * 0.003);
        const angle = n * TWO_PI * 2.0;

        this.vx += cos(angle) * 0.003;
        this.vy += sin(angle) * 0.002;

        if (pointerActive) {
          const dx = pointerX - this.x;
          const dy = pointerY - this.y;
          const d = sqrt(dx * dx + dy * dy);

          if (d < 300) {
            const nx = dx / max(d, 0.0001);
            const ny = dy / max(d, 0.0001);

            const farForce = map(d, 0, 300, 0.038, 0.003, true);
            this.vx += nx * farForce;
            this.vy += ny * farForce;

            if (d < 110) {
              const nearForce = map(d, 0, 110, 0.056, 0.012, true);
              this.vx += nx * nearForce;
              this.vy += ny * nearForce;
              this.vx *= 0.93;
              this.vy *= 0.93;
              this.size = lerp(this.size, this.baseSize * 1.32, 0.08);
              this.alpha = lerp(this.alpha, 0.5, 0.06);
              this.glow = lerp(this.glow, 1, 0.1);
            } else {
              this.size = lerp(this.size, this.baseSize * 1.08, 0.04);
              this.alpha = lerp(this.alpha, 0.3, 0.03);
              this.glow = lerp(this.glow, 0.35, 0.04);
            }
          } else {
            this.size = lerp(this.size, this.baseSize, 0.03);
            this.alpha = lerp(this.alpha, 0.2, 0.02);
            this.glow = lerp(this.glow, 0, 0.03);
          }
        } else {
          this.size = lerp(this.size, this.baseSize, 0.02);
          this.alpha = lerp(this.alpha, 0.18, 0.02);
          this.glow = lerp(this.glow, 0, 0.02);
        }

        this.vx *= 0.985;
        this.vy *= 0.985;

        this.vx = constrain(this.vx, -0.32, 0.32);
        this.vy = constrain(this.vy, -0.24, 0.24);

        this.x += this.vx;
        this.y += this.vy;

        if (this.x < -10) this.x = width + 10;
        if (this.x > width + 10) this.x = -10;
        if (this.y < -10) this.y = height + 10;
        if (this.y > height + 10) this.y = -10;
      }

      draw() {
        noStroke();

        const glowBoost = this.glow * 0.18;
        const brightnessBoost = this.glow * 18;

        fill(this.hue, this.sat, min(100, this.bri + brightnessBoost * 0.25), (this.alpha + glowBoost) * 0.14);
        circle(this.x, this.y, this.size * 4.0);

        fill(this.hue, this.sat, min(100, this.bri + brightnessBoost * 0.45), (this.alpha + glowBoost) * 0.3);
        circle(this.x, this.y, this.size * 2.1);

        fill(this.hue, this.sat * 0.72, min(100, this.bri + brightnessBoost), this.alpha + glowBoost * 0.8);
        circle(this.x, this.y, this.size);
      }
    }

    class Wake {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.life = 1;
        this.size = random(8, 18);
      }

      update() {
        this.life -= 0.03;
        this.size += 0.38;
      }

      draw() {
        noFill();
        stroke(205, 42, 78, this.life * 0.045);
        strokeWeight(1);
        ellipse(this.x, this.y, this.size * 0.85, this.size * 1.2);
      }

      isDead() {
        return this.life <= 0;
      }
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 1);
      pixelDensity(1);

      verseDiv = select("#verse");
      hintDiv = select("#hint");

      const particleCount = min(2600, floor((windowWidth * windowHeight) / 620));
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }

      pointerX = width * 0.5;
      pointerY = height * 0.58;
      lastPointerX = pointerX;
      lastPointerY = pointerY;

      background(220, 70, 4, 1);
    }

    function draw() {
      background(220, 70, 4, 0.22);

      drawBreathField();
      drawWakeTrail();

      for (const particle of particles) {
        particle.update();
        particle.draw();
      }

      drawDepthVeil();
      drawPointerHalo();
      updatePresenceState();
      updateScriptureSequence();
      updateSound();
    }

    function drawBreathField() {
      noStroke();
      const pulse = map(sin(frameCount * 0.014), -1, 1, 0.018, 0.045);
      fill(215, 40, 8, pulse);
      rect(0, 0, width, height);
    }

    function drawWakeTrail() {
      for (let i = wakes.length - 1; i >= 0; i--) {
        wakes[i].update();
        wakes[i].draw();

        if (wakes[i].isDead()) {
          wakes.splice(i, 1);
        }
      }
    }

    function drawDepthVeil() {
      noStroke();
      fill(220, 40, 6, 0.045);
      rect(0, 0, width, height);

      if (pointerActive) {
        for (let i = 0; i < 4; i++) {
          const radius = 130 - i * 20;
          fill(205, 44, 26, 0.013);
          ellipse(pointerX, pointerY, radius * 1.05, radius * 1.5);
        }
      }
    }

    function drawPointerHalo() {
      if (!pointerActive) {
        return;
      }

      noStroke();

      fill(202, 35, 90, 0.03);
      ellipse(pointerX, pointerY, 72, 110);

      fill(202, 30, 96, 0.06);
      ellipse(pointerX, pointerY, 34, 52);

      fill(202, 20, 100, 0.14);
      ellipse(pointerX, pointerY, 12, 18);
    }

    function updatePresenceState() {
      if (!introShown && frameCount > 45) {
        introShown = true;
        showVerse("In the beginning", 3200);
      }

      if (pointerActive) {
        const moved = dist(pointerX, pointerY, lastPointerX, lastPointerY);
        movementSpeed = lerp(movementSpeed, moved, 0.25);

        if (moved < 4) {
          totalHoverTime += 1;
          pointerStillFrames += 1;
        } else {
          totalHoverTime = max(0, totalHoverTime - 0.12);
          pointerStillFrames = 0;
        }

        if (frameCount % 4 === 0) {
          wakes.push(new Wake(pointerX, pointerY));
        }

        if (pointerStillFrames > 26 && frameCount % 14 === 0) {
          wakes.push(new Wake(pointerX + random(-4, 4), pointerY + random(-4, 4)));
        }

        hintDiv.style("opacity", totalHoverTime > 120 ? "0" : "1");
      } else {
        totalHoverTime = max(0, totalHoverTime - 0.3);
        pointerStillFrames = 0;
        movementSpeed = lerp(movementSpeed, 0, 0.1);
      }

      lastPointerX = pointerX;
      lastPointerY = pointerY;

      if (hoverTextCooldown > 0) {
        hoverTextCooldown -= 1;
      }
    }

    function updateScriptureSequence() {
      if (wordIndex >= scriptureMoments.length - 1) {
        return;
      }

      const nextIndex = wordIndex + 1;
      if (nextIndex < scriptureMoments.length && totalHoverTime >= scriptureMoments[nextIndex].trigger && hoverTextCooldown === 0) {
        wordIndex = nextIndex;
        showVerse(scriptureMoments[wordIndex].text, scriptureMoments[wordIndex].duration);
        hoverTextCooldown = 110;
      }
    }

    function showVerse(text, duration) {
      verseDiv.html(text);
      verseDiv.style("opacity", "0.88");

      clearTimeout(showVerse.fadeTimer);
      showVerse.fadeTimer = setTimeout(() => {
        verseDiv.style("opacity", "0");
      }, duration);
    }

    function initAudio() {
      if (audioStarted) {
        return;
      }

      userStartAudio();

      windOsc = new p5.Oscillator("triangle");
      breathOsc = new p5.Oscillator("sine");
      windFilter = new p5.LowPass();

      windOsc.disconnect();
      breathOsc.disconnect();

      windOsc.connect(windFilter);
      breathOsc.connect(windFilter);

      windFilter.freq(700);
      windFilter.res(3);

      windOsc.amp(0);
      breathOsc.amp(0);

      windOsc.start();
      breathOsc.start();

      audioStarted = true;
      noiseEnvReady = true;
    }

    function updateSound() {
      if (!noiseEnvReady) {
        return;
      }

      const movementAmount = constrain(movementSpeed / 18, 0, 1);
      const drift = map(noise(frameCount * 0.01), 0, 1, 110, 180);
      const breath = map(sin(frameCount * 0.018), -1, 1, 58, 72);
      const filterFreq = map(movementAmount, 0, 1, 420, 1400);

      windOsc.freq(drift + movementAmount * 36);
      breathOsc.freq(breath);

      windFilter.freq(filterFreq);

      const windAmp = pointerActive ? map(movementAmount, 0, 1, 0.004, 0.026) : 0;
      const breathAmpValue = pointerActive ? map(movementAmount, 0, 1, 0.01, 0.004) : 0.006;

      windOsc.amp(windAmp, 0.18);
      breathOsc.amp(breathAmpValue, 0.24);
    }

    function setPointer(x, y) {
      pointerX = constrain(x, 0, width);
      pointerY = constrain(y, 0, height);
      pointerActive = true;
      initAudio();
    }

    function mouseMoved() {
      setPointer(mouseX, mouseY);
    }

    function mouseDragged() {
      setPointer(mouseX, mouseY);
    }

    function mousePressed() {
      initAudio();
      setPointer(mouseX, mouseY);
    }

    function touchStarted() {
      initAudio();

      if (touches.length > 0) {
        setPointer(touches[0].x, touches[0].y);
      }

      return false;
    }

    function touchMoved() {
      if (touches.length > 0) {
        setPointer(touches[0].x, touches[0].y);
      }

      return false;
    }

    function touchEnded() {
      if (touches.length === 0) {
        pointerActive = false;
      }

      return false;
    }

    function mouseOut() {
      pointerActive = false;
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      background(220, 70, 4, 1);
    }
  </script>
</body>
</html>
