<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rachaph — Hovering</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    body { margin:0; padding:0; overflow:hidden; background:#00040f; }
    canvas { display:block; }
    #verse {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(140, 180, 255, 0.6);
      font-size: 4.5rem;
      letter-spacing: 5px;
      font-weight: 300;
      font-style: italic;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 8s ease;
      text-shadow: 0 0 40px rgba(60, 100, 255, 0.3);
      max-width: 90%;
      line-height: 1.3;
    }
  </style>
</head>
<body>
<div id="verse"></div>

<script>
let particles = [];
let totalHoverTime = 0;
let lastX = 0, lastY = 0;
let wordIndex = -1;

const genesisWords = [
  "In the beginning",
  "God",
  "created",
  "heavens",
  "earth",
  "formless",
  "void",
  "darkness",
  "deep",
  "Spirit",
  "hovering",
  "waters"
];

class Particle {
  constructor() {
    this.x = random(width);
    this.y = random(height);
    this.vx = random(-0.18, 0.18);
    this.vy = random(-0.18, 0.18);
    this.size = random(3, 8);
    this.hue = random(190, 235);
    this.alpha = 0.68;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0) this.x = width;
    if (this.x > width) this.x = 0;
    if (this.y < 0) this.y = height;
    if (this.y > height) this.y = 0;
  }

  attractTo(mx, my) {
    let d = dist(this.x, this.y, mx, my);
    if (d < 480) {
      let pull = map(d, 0, 480, 0.085, 0.0015);
      let angle = atan2(my - this.y, mx - this.x);
      this.vx += cos(angle) * pull;
      this.vy += sin(angle) * pull;

      if (d < 180) {
        this.vx *= 0.93;
        this.vy *= 0.93;
        this.hue = lerp(this.hue, 210, 0.015);
        this.alpha = lerp(this.alpha, 0.9, 0.01);
        this.size = lerp(this.size, 6.5, 0.015);
      }
    }
  }

  draw() {
    noStroke();
    fill(this.hue, 68, 72, this.alpha);
    circle(this.x, this.y, this.size);
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);

  for (let i = 0; i < 1400; i++) {
    particles.push(new Particle());
  }

  verseDiv = select('#verse');
}

function draw() {
  background(220, 95, 2, 0.018);

  for (let p of particles) {
    p.update();
    p.attractTo(mouseX, mouseY);
    p.draw();
  }

  let moved = dist(mouseX, mouseY, lastX, lastY);
  if (moved < 9) {
    totalHoverTime++;
  } else {
    totalHoverTime = max(0, totalHoverTime - 0.6);
  }
  lastX = mouseX; lastY = mouseY;

  if (totalHoverTime > 220 && wordIndex < genesisWords.length - 1) {
    if (frameCount % 900 === 0) {
      wordIndex++;
      let word = genesisWords[wordIndex];
      verseDiv.html(word);
      verseDiv.style('opacity', 0.72);
      setTimeout(() => {
        verseDiv.style('opacity', 0);
      }, 16000);
    }
  }

  if (totalHoverTime > 280) {
    fill(60, 50, 100, 0.4);
    for (let i = 0; i < 4; i++) {
      let sx = mouseX + random(-100, 100);
      let sy = mouseY + random(-100, 100);
      circle(sx, sy, 1.4);
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
