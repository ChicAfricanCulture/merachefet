<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rachaph — Hovering Presence</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    body { margin:0; padding:0; overflow:hidden; background:#000308; }
    canvas { display:block; }
    #verse {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(130, 170, 255, 0.55);
      font-size: 4.8rem;
      letter-spacing: 6px;
      font-weight: 300;
      font-style: italic;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 9s ease;
      text-shadow: 0 0 50px rgba(50, 90, 255, 0.25);
      max-width: 90%;
      line-height: 1.3;
    }
    @media (max-width: 600px) {
      #verse { font-size: 3.4rem; }
    }
  </style>
</head>
<body>
<div id="verse"></div>

<script>
// Rachaph — Hovering Presence
// Deep darkness. Waters. Spirit hovers before words.
// Tiny round droplets, soothing magnet, pure void blues.

let particles = [];
let totalHoverTime = 0;
let lastX = 0, lastY = 0;
let wordIndex = -1;

// Your exact word list (Genesis 1:1–3 phrases)
const genesisWords = [
  "In the beginning",
  "God",
  "created",
  "heavens",
  "earth",
  "formless",
  "void",
  "darkness",
  "deep",
  "Spirit",
  "hovering",
  "waters"
];

class Particle {
  constructor() {
    this.x = random(width);
    this.y = random(height);
    this.vx = random(-0.15, 0.15);
    this.vy = random(-0.15, 0.15);
    this.size = random(1, 7);      // teeny-tiny to small droplets
    this.hue = random(195, 235);   // deepest midnight/indigo blues
    this.alpha = 0.65;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0) this.x = width;
    if (this.x > width) this.x = 0;
    if (this.y < 0) this.y = height;
    if (this.y > height) this.y = 0;
  }

  attractTo(mx, my) {
    let d = dist(this.x, this.y, mx, my);
    if (d < 500) {  // wide gentle pull
      let pull = map(d, 0, 500, 0.09, 0.001);
      let angle = atan2(my - this.y, mx - this.x);
      this.vx += cos(angle) * pull;
      this.vy += sin(angle) * pull;

      if (d < 200) {
        this.vx *= 0.92;   // calm/slow
        this.vy *= 0.92;
        this.alpha = lerp(this.alpha, 0.88, 0.008);
        this.size = lerp(this.size, this.size * 1.1, 0.01);  // gentle droplet swell
      }
    }
  }

  draw() {
    noStroke();
    fill(this.hue, 75, 60, this.alpha);
    circle(this.x, this.y, this.size);
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);

  for (let i = 0; i < 1600; i++) {  // more tiny particles for density
    particles.push(new Particle());
  }

  verseDiv = select('#verse');
}

function draw() {
  background(220, 98, 1.5, 0.015);  // ultra-slow deep blue/black fade — pure void

  for (let p of particles) {
    p.update();
    p.attractTo(mouseX, mouseY);
    p.draw();
  }

  let moved = dist(mouseX, mouseY, lastX, lastY);
  if (moved < 8) {
    totalHoverTime++;
  } else {
    totalHoverTime = max(0, totalHoverTime - 0.5);  // very slow decay
  }
  lastX = mouseX; lastY = mouseY;

  // Genesis words — appear one at a time after calm hovering
  if (totalHoverTime > 240 && wordIndex < genesisWords.length - 1) {
    if (frameCount % 1080 === 0) {  // ~18 seconds per word
      wordIndex++;
      let word = genesisWords[wordIndex];
      verseDiv.html(word);
      verseDiv.style('opacity', 0.68);
      setTimeout(() => {
        verseDiv.style('opacity', 0);
      }, 18000);  // stay visible 18 seconds
    }
  }

  // Persistent faint stars/trails where you hovered longest
  if (totalHoverTime > 300) {
    fill(60, 55, 100, 0.35);
    for (let i = 0; i < 4; i++) {
      let sx = mouseX + random(-90, 90);
      let sy = mouseY + random(-90, 90);
      circle(sx, sy, 1.3);
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
