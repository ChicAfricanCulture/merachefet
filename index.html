<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rachaph — Hovering Presence</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    body { margin:0; padding:0; overflow:hidden; background:#000814; }
    canvas { display:block; }
    #verse {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(160, 190, 255, 0.65);
      font-size: 4.2rem;
      letter-spacing: 5px;
      font-weight: 300;
      font-style: italic;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 7s ease;
      text-shadow: 0 0 45px rgba(80, 120, 255, 0.35);
      max-width: 90%;
      line-height: 1.3;
    }
    @media (max-width: 600px) {
      #verse { font-size: 3rem; }
    }
  </style>
</head>
<body>
<div id="verse"></div>

<script>
// Rachaph — Hovering Presence
// Deep darkness. Waters. Spirit hovers before words.
// Particles stay as droplets, gather like water.

let particles = [];
let totalHoverTime = 0;
let lastX = 0, lastY = 0;
let wordIndex = -1;

// Single words from Genesis 1:1–3
const genesisWords = [
  "beginning",
  "created",
  "heavens",
  "earth",
  "formless",
  "void",
  "darkness",
  "deep",
  "Spirit",
  "hovering",
  "waters"
];

class Particle {
  constructor() {
    this.x = random(width);
    this.y = random(height);
    this.vx = random(-0.25, 0.25);
    this.vy = random(-0.25, 0.25);
    this.size = random(3, 7);      // droplet-like
    this.hue = random(190, 230);   // deep blues
    this.alpha = 0.75;             // visible
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0) this.x = width;
    if (this.x > width) this.x = 0;
    if (this.y < 0) this.y = height;
    if (this.y > height) this.y = 0;
  }

  attractTo(mx, my) {
    let d = dist(this.x, this.y, mx, my);
    if (d < 450) {  // wide gentle pull
      let pull = map(d, 0, 450, 0.10, 0.002);  // strong near, soft far
      let angle = atan2(my - this.y, mx - this.x);
      this.vx += cos(angle) * pull;
      this.vy += sin(angle) * pull;

      // calm & gather when close (stay round droplets)
      if (d < 160) {
        this.vx *= 0.94;   // slow down
        this.vy *= 0.94;
        this.hue = lerp(this.hue, 205, 0.025);
        this.alpha = lerp(this.alpha, 0.92, 0.015);
        this.size = lerp(this.size, 5.5, 0.02);  // slight swell like droplets merging
      }
    }
  }

  draw() {
    noStroke();
    fill(this.hue, 70, 78, this.alpha);
    circle(this.x, this.y, this.size);
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);

  for (let i = 0; i < 1200; i++) {
    particles.push(new Particle());
  }

  verseDiv = select('#verse');
}

function draw() {
  background(220, 92, 2.5, 0.025);  // ultra-slow deep blue — stays dark

  for (let p of particles) {
    p.update();
    p.attractTo(mouseX, mouseY);
    p.draw();
  }

  // Hover accumulation
  let moved = dist(mouseX, mouseY, lastX, lastY);
  if (moved < 10) {
    totalHoverTime++;
  } else {
    totalHoverTime = max(0, totalHoverTime - 0.8);  // very slow decay
  }
  lastX = mouseX; lastY = mouseY;

  // Genesis single words — appear slowly after calm hovering
  if (totalHoverTime > 200 && wordIndex < genesisWords.length - 1) {
    if (frameCount % 720 === 0) {  // ~12 seconds per word
      wordIndex++;
      let word = genesisWords[wordIndex];
      verseDiv.html(word);
      verseDiv.style('opacity', 0.75);
      setTimeout(() => {
        verseDiv.style('opacity', 0);
      }, 14000);  // stay visible 14 seconds
    }
  }

  // Persistent faint stars/trails where you hovered longest
  if (totalHoverTime > 250) {
    fill(60, 45, 100, 0.45);
    for (let i = 0; i < 5; i++) {
      let sx = mouseX + random(-110, 110);
      let sy = mouseY + random(-110, 110);
      circle(sx, sy, 1.5);
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
